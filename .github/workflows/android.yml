name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Remove Firebase references from Java files
        run: |
          find app/src -name "*.java" | xargs sed -i '/import com\.google\.firebase/d'
          find app/src -name "*.java" | xargs sed -i '/FirebaseCrashlytics/d'
          find app/src -name "*.java" | xargs sed -i '/crashlytics\./d'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dictate-APK
          path: app/build/outputs/apk/debug/app-debug.apk
